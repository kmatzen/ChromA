name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pinned toolchain.  Both of these were floating refs (devkitarm:latest and
# mgba master, re-pulled every run), which made CI non-reproducible: the
# April 2026 known-green tree fails today with an identical set of visual
# failures, purely from toolchain drift.  devkitarm:latest was retagged
# 2026-06-10; 20260221 is the tag that was 'latest' when these baselines
# were generated.  Bump these deliberately, and regenerate baselines in the
# same change.
env:
  MGBA_PIN: 81fa2e982c107a8d337e46cf858aaf99fe4d2e49  # 2026-04-04

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260221

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: make
      env:
        DEVKITARM: /opt/devkitpro/devkitARM

    - name: Upload GBA binary
      uses: actions/upload-artifact@v4
      with:
        name: chroma.gba
        path: chroma.gba

    # test_menu.py reads symbol addresses from this map.  Without it, it
    # silently falls back to hardcoded defaults that go stale the moment the
    # memory layout shifts -- 12 of 13 were wrong, so the menu tests were
    # poking unrelated memory and reporting behavioural failures.
    - name: Upload ELF map
      uses: actions/upload-artifact@v4
      with:
        name: chroma.elf.map
        path: build/chroma.elf.map

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Download ELF map
      uses: actions/download-artifact@v4
      with:
        name: chroma.elf.map
        path: build

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libelf-dev libpng-dev \
          libsqlite3-dev libedit-dev python3-pip
        pip3 install --break-system-packages Pillow

    - name: Build mGBA library
      run: |
        git clone https://github.com/mgba-emu/mgba.git /tmp/mgba-build
        git -C /tmp/mgba-build checkout $MGBA_PIN
        mkdir -p /tmp/mgba-build/build
        cd /tmp/mgba-build/build
        cmake .. -DBUILD_QT=OFF -DBUILD_SDL=OFF \
          -DUSE_EPOXY=OFF -DUSE_FFMPEG=OFF -DUSE_LIBZIP=OFF \
          -DUSE_DISCORD_RPC=OFF -DUSE_LUA=OFF -DUSE_LZMA=OFF \
          -DENABLE_VFS_FD=ON -DENABLE_VFS=ON -DENABLE_DIRECTORIES=ON
        make -j$(nproc)

    - name: Build test runner
      run: |
        cc -O2 \
          -I/tmp/mgba-build/include -I/tmp/mgba-build/build/include -I/tmp/mgba-build/src \
          -include /tmp/mgba-build/build/include/mgba/flags.h \
          -DM_CORE_GB -DM_CORE_GBA -DMGBA_DLL \
          -o test_roms/mgba_runner test_roms/mgba_runner.c \
          -L/tmp/mgba-build/build -lmgba -Wl,-rpath,/tmp/mgba-build/build

    - name: Run custom ROM visual tests
      run: |
        python3 test_roms/run_tests.py \
          -t ei_delay_test \
          -t halt_bug_test \
          -t jr_hram_test \
          -t rst_timing_test \
          -t sprite_limit_test \
          -t timer_accuracy_test
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

    - name: Run RST timing test
      run: python3 test_roms/test_rst_timing.py
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

    - name: Run nexttimeout_alt nesting test
      run: python3 test_roms/test_nexttimeout_nesting.py
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

    - name: Run MBC2 SRAM write-through test
      run: python3 test_roms/test_mbc2_sram.py
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

  test-full:
    needs: build
    runs-on: ubuntu-latest
    # Runs on main pushes AND on same-repo PRs.  Fork PRs are excluded because
    # GitHub withholds secrets from them, so TEST_ROMS_PAT would be empty and
    # the private ROM download would fail for reasons unrelated to the change.
    #
    # This exists because the visual and menu suites only ran after merge,
    # which let a timing regression reach main across three red pushes before
    # anyone could see it (see #29 / #30).
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    environment: test-roms

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Download ELF map
      uses: actions/download-artifact@v4
      with:
        name: chroma.elf.map
        path: build

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libelf-dev libpng-dev \
          libsqlite3-dev libedit-dev python3-pip
        pip3 install --break-system-packages Pillow

    - name: Build mGBA library
      run: |
        git clone https://github.com/mgba-emu/mgba.git /tmp/mgba-build
        git -C /tmp/mgba-build checkout $MGBA_PIN
        mkdir -p /tmp/mgba-build/build
        cd /tmp/mgba-build/build
        cmake .. -DBUILD_QT=OFF -DBUILD_SDL=OFF \
          -DUSE_EPOXY=OFF -DUSE_FFMPEG=OFF -DUSE_LIBZIP=OFF \
          -DUSE_DISCORD_RPC=OFF -DUSE_LUA=OFF -DUSE_LZMA=OFF \
          -DENABLE_VFS_FD=ON -DENABLE_VFS=ON -DENABLE_DIRECTORIES=ON
        make -j$(nproc)

    - name: Build test runner
      run: |
        cc -O2 \
          -I/tmp/mgba-build/include -I/tmp/mgba-build/build/include -I/tmp/mgba-build/src \
          -include /tmp/mgba-build/build/include/mgba/flags.h \
          -DM_CORE_GB -DM_CORE_GBA -DMGBA_DLL \
          -o test_roms/mgba_runner test_roms/mgba_runner.c \
          -L/tmp/mgba-build/build -lmgba -Wl,-rpath,/tmp/mgba-build/build

    - name: Download game ROMs
      run: |
        gh release download latest \
          --repo kmatzen/test-roms-private \
          --pattern 'game-roms.zip' \
          --dir /tmp
        unzip -o /tmp/game-roms.zip -d test_roms/
      env:
        GH_TOKEN: ${{ secrets.TEST_ROMS_PAT }}

    - name: Run full test suite
      run: |
        python3 test_roms/run_tests.py --diff-dir /tmp/test-diffs || true
        python3 test_roms/run_all_tests.py
      env:
        LD_LIBRARY_PATH: /tmp/mgba-build/build

    - name: Generate diff report
      if: always()
      run: |
        if [ -d /tmp/test-diffs ] && ls /tmp/test-diffs/*_comparison.png 1>/dev/null 2>&1; then
          python3 test_roms/generate_diff_report.py /tmp/test-diffs /tmp/test-diffs/report.html
        else
          echo "<html><body><h1>All tests passed — no visual regressions</h1></body></html>" > /tmp/test-diffs-report.html
          mkdir -p /tmp/test-diffs
          cp /tmp/test-diffs-report.html /tmp/test-diffs/report.html
        fi

    - name: Upload diff report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-diff-report
        path: /tmp/test-diffs/report.html

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Get short SHA
      id: sha
      run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create/update latest release
      run: |
        gh release delete latest --yes 2>/dev/null || true
        gh release create latest chroma.gba \
          --title "Latest build (${{ steps.sha.outputs.short }})" \
          --notes "Built from [\`${{ steps.sha.outputs.short }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-demo:
    needs: [test, test-full]
    if: always() && needs.test.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: chroma.gba

    - name: Get short SHA
      id: sha
      run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Download diff report
      uses: actions/download-artifact@v4
      with:
        name: visual-diff-report
        path: /tmp/diff-report
      continue-on-error: true

    - name: Build pages output
      run: |
        mkdir -p _site
        cp -r docs/* _site/
        cp chroma.gba _site/chroma.gba
        sed -i "s|Game Boy \&middot; Game Boy Color \&middot; on GBA|Game Boy \&middot; Game Boy Color \&middot; on GBA<br><span style=\"font-size:0.7em;color:#334\">build ${{ steps.sha.outputs.short }}</span>|" _site/index.html
        # Include test report if available
        if [ -f /tmp/diff-report/report.html ]; then
          cp /tmp/diff-report/report.html _site/test-report.html
        fi

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4
